services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: anchenchat-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - ./auth:/app/auth:ro
      - ./data:/app/data
    networks:
      - anchenchat

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - anchenchat

networks:
  anchenchat:
    driver: bridge
